<script>
/* Shared Yuccabucca library — generated from /yucca-bridge.js by build-html.mjs.
   Do not edit here; edit yucca-bridge.js and re-run `node build-html.mjs`. */
// ============================================================================
// YUCCA-BRIDGE — shared library for the Yuccabucca apps (RAW FORM + YUCCA-FX).
//
// Both apps are static, no-build pages served from the same origin, so they
// share one IndexedDB. Two stores live side by side:
//   • 'samples' — rendered audio Blobs (WAV/MP3). RAW FORM's sampler loads these
//                 and repitches them; YUCCA-FX writes its exports here.
//   • 'presets' — YUCCA-FX patch JSON (parametric, tiny, serializable). RAW FORM
//                 can render these live per note; YUCCA-FX mirrors its bank here.
//
// No build step. Plain ES module:  import { YuccaSamples, YuccaPresets } from './yucca-bridge.js';
// Also published on `window` for the zero-build inlined path (RAW FORM's
// generated index.html inlines this; YUCCA-FX inlines a synced copy).
//
// IndexedDB:  db 'yuccabucca' (v2)  ·  stores keyed on 'id'
//   sample record = { id, name, createdAt, mime:'audio/wav'|'audio/mpeg', blob:Blob }
//   preset record = { id, name, createdAt, patch:object }
//
// Every method is async and defensive: a missing/blocked IndexedDB degrades to
// a same-session in-memory Map per store instead of throwing.
// ============================================================================

const DB_NAME = 'yuccabucca';
const DB_VERSION = 2;            // v1 = samples only; v2 added presets
const STORES = ['samples', 'presets'];

const _mem = { samples: new Map(), presets: new Map() };
const _idb = (typeof indexedDB !== 'undefined') ? indexedDB : null;
const _uid = (pfx) => `${pfx}${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;

// Open (creating/upgrading) the database. Resolves null if IndexedDB is absent
// or the open fails — callers then fall back to the in-memory map.
let _dbPromise = null;
function _openDB() {
  if (!_idb) return Promise.resolve(null);
  if (_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve) => {
    let req;
    try { req = _idb.open(DB_NAME, DB_VERSION); }
    catch (e) { resolve(null); return; }
    req.onupgradeneeded = () => {
      const db = req.result;
      // Create any missing store; a v1 db (samples only) gains 'presets' here
      // without dropping existing samples.
      STORES.forEach((s) => { if (!db.objectStoreNames.contains(s)) db.createObjectStore(s, { keyPath: 'id' }); });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => resolve(null);
    req.onblocked = () => resolve(null);
  });
  return _dbPromise;
}

// Run one transaction against a store; resolves the request result, or a
// { _fallback:true } sentinel when there's no usable IndexedDB.
function _tx(storeName, mode, fn) {
  return _openDB().then((db) => {
    if (!db) return { _fallback: true };
    return new Promise((resolve, reject) => {
      let tx;
      try { tx = db.transaction(storeName, mode); }
      catch (e) { reject(e); return; }
      const store = tx.objectStore(storeName);
      let out;
      try { out = fn(store); }
      catch (e) { reject(e); return; }
      tx.oncomplete = () => resolve(out && out.result !== undefined ? out.result : out);
      tx.onerror = () => reject(tx.error);
      tx.onabort = () => reject(tx.error);
    });
  });
}

// Build a CRUD adapter for one store. `buildRecord` turns put() input into a
// stored record (and assigns id/createdAt); `project` strips heavy fields from
// list() results.
function _makeStore(storeName, buildRecord, project) {
  const mem = _mem[storeName];
  return {
    async put(input = {}) {
      const rec = buildRecord(input);
      try {
        const r = await _tx(storeName, 'readwrite', (store) => { store.put(rec); return {}; });
        if (r && r._fallback) mem.set(rec.id, rec);
      } catch (e) { mem.set(rec.id, rec); }
      return rec.id;
    },
    async list() {
      try {
        const r = await _tx(storeName, 'readonly', (store) => store.getAll());
        if (r && r._fallback) return [...mem.values()].map(project).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        return (r || []).map(project).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      } catch (e) {
        return [...mem.values()].map(project).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      }
    },
    async get(id) {
      try {
        const r = await _tx(storeName, 'readonly', (store) => store.get(id));
        if (r && r._fallback) return mem.get(id) || null;
        return r || null;
      } catch (e) { return mem.get(id) || null; }
    },
    async remove(id) {
      try {
        const r = await _tx(storeName, 'readwrite', (store) => { store.delete(id); return {}; });
        if (r && r._fallback) mem.delete(id);
      } catch (e) { mem.delete(id); }
      mem.delete(id);
    },
  };
}

// --- samples: rendered audio Blobs --------------------------------------------
// put({ name, blob, mime }) -> id   ·   list() omits blobs (keep it light)
const YuccaSamples = _makeStore(
  'samples',
  ({ name, blob, mime }) => ({
    id: _uid('s'),
    name: (name || 'sample').toString().slice(0, 48),
    createdAt: Date.now(),
    mime: mime || (blob && blob.type) || 'audio/wav',
    blob,
  }),
  ({ id, name, createdAt, mime }) => ({ id, name, createdAt, mime }),
);

// --- presets: YUCCA-FX patch JSON ---------------------------------------------
// put({ id?, name, patch }) -> id   ·   id optional so callers can upsert by a
// stable key (YUCCA-FX passes its own preset id, making save/sync idempotent).
// patch is tiny, so list() includes it.
const YuccaPresets = _makeStore(
  'presets',
  ({ id, name, patch }) => ({
    id: id || _uid('p'),
    name: (name || 'PRESET').toString().slice(0, 48),
    createdAt: Date.now(),
    patch: patch || {},
  }),
  ({ id, name, createdAt, patch }) => ({ id, name, createdAt, patch }),
);

// Publish on window for the zero-build / inlined path (harmless when bundled).
if (typeof window !== 'undefined') {
  window.YuccaSamples = YuccaSamples;
  window.YuccaPresets = YuccaPresets;
}

</script>
<!-- yucca-bridge:end -->

<script type="text/babel" data-presets="react">
(function () {
const { useState, useEffect, useRef, useCallback } = React;

// ============================================================================
// RAW FORMLESS — an 8-bit ambience & drone engine.
//
// Build long, evolving drones from basic chip waveforms, modulate them with
// assignable LFOs, sweeten with ambient FX, then render a POP-FREE LOOP and
// hand it to RAW FORM (via the shared yucca-bridge IndexedDB library) where it
// loads as a sampler voice — exactly like a YUCCA-FX export.
//
// The whole signal graph is built by buildGraph(), which serves both realtime
// preview (AudioContext) and offline render (OfflineAudioContext) from one
// codepath, so what you hear is what you bounce.
// ============================================================================

const COLORS = {
  bass: '#ff5544', drums: '#ffaa22', lead: '#7fff7f', pad: '#66bbff',
  echo: '#ff66cc', song: '#c9a0ff', samples: '#34e0c4', cream: '#f5ecd3',
};
const PS = '"Press Start 2P", monospace';
const VT = 'VT323, monospace';
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const midiToFreq = (m) => 440 * Math.pow(2, (m - 69) / 12);
const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
const noteName = (m) => `${NOTE_NAMES[((m % 12) + 12) % 12]}${Math.floor(m / 12) - 1}`;

// ---- waveform builders (chip-accurate-ish via Fourier PeriodicWaves) --------
function pulseWave(ctx, duty) {
  const H = 48;
  const real = new Float32Array(H), imag = new Float32Array(H);
  for (let n = 1; n < H; n++) real[n] = (2 / (n * Math.PI)) * Math.sin(n * Math.PI * duty);
  return ctx.createPeriodicWave(real, imag);
}
function triWave(ctx) {
  const H = 32;
  const real = new Float32Array(H), imag = new Float32Array(H);
  for (let n = 1; n < H; n++) if (n % 2 === 1) real[n] = (8 / (Math.PI * Math.PI)) * Math.pow(-1, (n - 1) / 2) / (n * n);
  return ctx.createPeriodicWave(real, imag);
}
function noiseBuffer(ctx) {
  const len = Math.floor(ctx.sampleRate * 2);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}
function impulseResponse(ctx, size) {
  const len = Math.max(2048, Math.floor(ctx.sampleRate * (0.15 + size * 3.2)));
  const decay = 1.6 + (1 - size) * 4;
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) { const t = i / len; d[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decay); }
  }
  return buf;
}
function driveCurve(amount) {
  const k = amount * 60 + 0.0001, n = 1024, c = new Float32Array(n);
  for (let i = 0; i < n; i++) { const x = (i / (n - 1)) * 2 - 1; c[i] = Math.tanh(k * x) / Math.tanh(k); }
  return c;
}
// Bit-depth quantizer (the "crunch"): a staircase transfer curve, memoryless so
// it renders offline natively. `bits` may be fractional.
function crushCurve(bits) {
  const levels = Math.max(2, Math.pow(2, clamp(bits, 1, 16)));
  const M = 2048, c = new Float32Array(M);
  for (let i = 0; i < M; i++) { const x = (i / (M - 1)) * 2 - 1; c[i] = Math.round(((x + 1) / 2) * (levels - 1)) / (levels - 1) * 2 - 1; }
  return c;
}

// ---- drawable LFO --------------------------------------------------------
// A drawn LFO is one cycle stored as CURVE_LEN points in [-1,1]. We turn it
// into a band-limited PeriodicWave by DFT, so an OscillatorNode plays it at the
// slot's rate and it renders natively in the offline bounce — same as the
// built-in shapes. The wave is auto-normalized to peak 1 (amount = slot depth),
// and the DC term is dropped so modulation stays centered (bipolar).
const CURVE_LEN = 64;
const defaultCurve = () => { const c = new Array(CURVE_LEN); for (let i = 0; i < CURVE_LEN; i++) c[i] = Math.sin((i / CURVE_LEN) * 2 * Math.PI); return c; };
function curveToPeriodicWave(ctx, curve, harmonics = 32) {
  const N = curve.length, H = Math.min(harmonics, Math.floor(N / 2));
  const real = new Float32Array(H + 1), imag = new Float32Array(H + 1);
  let energy = 0;
  for (let k = 1; k <= H; k++) {
    let a = 0, b = 0;
    for (let n = 0; n < N; n++) { const ph = (2 * Math.PI * k * n) / N; a += curve[n] * Math.cos(ph); b += curve[n] * Math.sin(ph); }
    real[k] = (2 / N) * a; imag[k] = (2 / N) * b;        // cos / sin coefficients
    energy += real[k] * real[k] + imag[k] * imag[k];
  }
  if (energy < 1e-7) return null;                          // flat line -> no modulation
  return ctx.createPeriodicWave(real, imag);              // normalize=true -> peak 1
}

// ---- drawable envelope ---------------------------------------------------
// An envelope is a drawn contour in [0,1] played over a DURATION (not a Hz
// rate). We bake it into a looping control-rate AudioBuffer and run it as
// bufferSource -> depthGain -> AudioParam, so it modulates natively in the
// offline bounce. When length == loop length (SYNC), the contour's wrap lands
// exactly on the audio seam crossfade, so it loops cleanly.
const defaultEnvCurve = () => { const c = new Array(CURVE_LEN); for (let i = 0; i < CURVE_LEN; i++) c[i] = 0.5 - 0.5 * Math.cos((i / CURVE_LEN) * 2 * Math.PI); return c; };
function curveToControlBuffer(ctx, curve, lengthSec) {
  const sr = ctx.sampleRate, len = Math.max(2, Math.floor(clamp(lengthSec, 0.05, 60) * sr));
  const buf = ctx.createBuffer(1, len, sr), d = buf.getChannelData(0), N = curve.length;
  for (let i = 0; i < len; i++) {
    const p = (i / len) * N, a = Math.floor(p) % N, b = (a + 1) % N, t = p - Math.floor(p);
    d[i] = curve[a] * (1 - t) + curve[b] * t;
  }
  return buf;
}

// ---- default patch ----------------------------------------------------------
const WAVES = ['pulse12', 'pulse25', 'pulse50', 'tri', 'saw', 'noise'];
const WAVE_LABEL = { pulse12: '12%', pulse25: '25%', pulse50: '50%', tri: 'TRI', saw: 'SAW', noise: 'NSE' };
const LFO_SHAPES = ['sine', 'triangle', 'square', 'sawtooth'];
const LFO_TARGETS = ['off', 'volume', 'cutoff', 'pitch'];

const defaultPatch = () => ({
  name: 'DRONE 01',
  root: 45,            // A2
  loopLen: 8,          // seconds
  crossfade: 0.6,      // seconds of pop-free overlap at the seam
  master: { volume: 0.7, drive: 0.12 },
  filter: { cutoff: 1400, reso: 4 },
  voices: [
    { on: true, wave: 'pulse50', semitone: 0, fine: 0, level: 0.6, pan: -0.3 },
    { on: true, wave: 'tri', semitone: 7, fine: 4, level: 0.5, pan: 0.3 },
    { on: true, wave: 'pulse25', semitone: 12, fine: -3, level: 0.32, pan: 0 },
  ],
  lfos: [
    { target: 'cutoff', shape: 'sine', rate: 0.12, depth: 0.55, curve: defaultCurve() },
    { target: 'volume', shape: 'triangle', rate: 0.07, depth: 0.3, curve: defaultCurve() },
  ],
  envs: [
    { target: 'off', depth: 0.6, length: 8, sync: true, curve: defaultEnvCurve() },
    { target: 'off', depth: 0.5, length: 8, sync: true, curve: defaultEnvCurve() },
  ],
  bitcrush: { on: false, bits: 6, mix: 0.5 },
  chorus: { on: false, rate: 0.6, depth: 0.5, mix: 0.4 },
  flanger: { on: false, rate: 0.3, depth: 0.6, feedback: 0.4, mix: 0.5 },
  phaser: { on: false, rate: 0.3, depth: 0.6, mix: 0.5 },
  delay: { on: true, time: 0.375, feedback: 0.42, mix: 0.3 },
  reverb: { on: true, size: 0.7, mix: 0.4 },
});

// ============================================================================
// SIGNAL GRAPH — one builder for realtime + offline. Returns { stop } so the
// realtime path can tear voices down; offline just lets it render to the end.
// `t0` is the start time on ctx; `dur` is total play length (for offline edges).
// ============================================================================
function buildGraph(ctx, p, destination, t0, dur) {
  const stops = [];

  // master sum -> drive -> volume -> destination
  const volume = ctx.createGain();
  volume.gain.value = p.master.volume;
  const drive = ctx.createWaveShaper();
  drive.curve = driveCurve(p.master.drive);
  drive.oversample = '2x';
  const sum = ctx.createGain();
  sum.gain.value = 1;
  sum.connect(drive); drive.connect(volume); volume.connect(destination);

  // voices -> filter -> [volume-envelope gains] -> ampMod (LFO tremolo).
  // preAmpTail is where volume envelopes splice in series (set the gain), kept
  // separate from ampMod which sums the bipolar LFO tremolo additively.
  const ampMod = ctx.createGain();
  ampMod.gain.value = 1;
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = p.filter.cutoff;
  filter.Q.value = p.filter.reso;
  let preAmpTail = filter;

  // Short anti-click fade-in only. A seamless loop is steady-state — its body is
  // extracted from after the pre-roll — so a musical attack/release would never
  // survive the bounce. Movement comes from the LFOs, the ambient way. (The
  // realtime fade-out is handled by stop().)
  const peak = Math.max(0.0002, p.master.volume);
  volume.gain.setValueAtTime(0.0001, t0);
  volume.gain.exponentialRampToValueAtTime(peak, t0 + 0.06);

  // dry + parallel FX sends into the sum bus
  // ---- FX: series modulation inserts, then parallel delay/reverb sends ----
  // Each insert wraps a wet sub-graph with a dry/wet mix (mix=0 -> bypass,
  // mix=1 -> fully wet). All sub-graphs are Oscillator/WaveShaper/Biquad based,
  // so the whole chain renders natively in the offline bounce.
  const startLfo = (osc) => { osc.start(t0); stops.push((tt) => { try { osc.stop(tt); } catch (e) {} }); };
  const insertFx = (inNode, fx, mix) => {
    const out = ctx.createGain();
    const wet = ctx.createGain(); wet.gain.value = clamp(mix, 0, 1);
    const dry = ctx.createGain(); dry.gain.value = 1 - clamp(mix, 0, 1);
    inNode.connect(fx.in); fx.out.connect(wet); wet.connect(out);
    inNode.connect(dry); dry.connect(out);
    return out;
  };
  let fxTail = ampMod;
  if (p.bitcrush && p.bitcrush.on) {
    const ws = ctx.createWaveShaper(); ws.curve = crushCurve(p.bitcrush.bits); ws.oversample = 'none';
    fxTail = insertFx(fxTail, { in: ws, out: ws }, p.bitcrush.mix);
  }
  if (p.chorus && p.chorus.on) {
    const inG = ctx.createGain(), outG = ctx.createGain();
    const dl = ctx.createDelay(0.08); dl.delayTime.value = 0.025;
    const lfo = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = clamp(p.chorus.rate, 0.02, 8);
    const ld = ctx.createGain(); ld.gain.value = clamp(p.chorus.depth, 0, 1) * 0.012;
    lfo.connect(ld); ld.connect(dl.delayTime); startLfo(lfo);
    inG.connect(dl); dl.connect(outG);
    fxTail = insertFx(fxTail, { in: inG, out: outG }, p.chorus.mix);
  }
  if (p.flanger && p.flanger.on) {
    const inG = ctx.createGain(), outG = ctx.createGain();
    const dl = ctx.createDelay(0.05); dl.delayTime.value = 0.002;
    const fb = ctx.createGain(); fb.gain.value = clamp(p.flanger.feedback, 0, 0.95);
    const lfo = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = clamp(p.flanger.rate, 0.02, 8);
    const ld = ctx.createGain(); ld.gain.value = clamp(p.flanger.depth, 0, 1) * 0.003;
    lfo.connect(ld); ld.connect(dl.delayTime); startLfo(lfo);
    inG.connect(dl); dl.connect(outG); dl.connect(fb); fb.connect(dl);
    fxTail = insertFx(fxTail, { in: inG, out: outG }, p.flanger.mix);
  }
  if (p.phaser && p.phaser.on) {
    const inG = ctx.createGain(), outG = ctx.createGain();
    let node = inG; const aps = [];
    for (let s = 0; s < 4; s++) { const ap = ctx.createBiquadFilter(); ap.type = 'allpass'; ap.frequency.value = 900; ap.Q.value = 0.7; node.connect(ap); node = ap; aps.push(ap); }
    node.connect(outG);
    const lfo = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = clamp(p.phaser.rate, 0.02, 8);
    const ld = ctx.createGain(); ld.gain.value = clamp(p.phaser.depth, 0, 1) * 1200;
    lfo.connect(ld); aps.forEach((ap) => ld.connect(ap.frequency)); startLfo(lfo);
    fxTail = insertFx(fxTail, { in: inG, out: outG }, p.phaser.mix);
  }

  // dry + parallel delay/reverb sends into the sum bus
  fxTail.connect(sum);
  if (p.delay.on && p.delay.mix > 0) {
    const send = ctx.createGain(); send.gain.value = p.delay.mix;
    const dl = ctx.createDelay(2.0); dl.delayTime.value = clamp(p.delay.time, 0.001, 2);
    const fb = ctx.createGain(); fb.gain.value = clamp(p.delay.feedback, 0, 0.92);
    const tone = ctx.createBiquadFilter(); tone.type = 'lowpass'; tone.frequency.value = 3200;
    fxTail.connect(send); send.connect(dl); dl.connect(tone); tone.connect(fb); fb.connect(dl); dl.connect(sum);
  }
  if (p.reverb.on && p.reverb.mix > 0) {
    const send = ctx.createGain(); send.gain.value = p.reverb.mix;
    const cv = ctx.createConvolver(); cv.normalize = true; cv.buffer = impulseResponse(ctx, p.reverb.size);
    fxTail.connect(send); send.connect(cv); cv.connect(sum);
  }

  // voices
  const voiceDetunes = [];
  p.voices.forEach((v) => {
    if (!v.on || v.level <= 0) return;
    const g = ctx.createGain(); g.gain.value = v.level;
    const pan = ctx.createStereoPanner(); pan.pan.value = clamp(v.pan, -1, 1);
    g.connect(pan); pan.connect(filter);
    if (v.wave === 'noise') {
      const src = ctx.createBufferSource(); src.buffer = noiseBuffer(ctx); src.loop = true;
      const nf = ctx.createBiquadFilter(); nf.type = 'bandpass';
      nf.frequency.value = midiToFreq(p.root + v.semitone); nf.Q.value = 6;
      src.connect(nf); nf.connect(g); src.start(t0); stops.push((tt) => { try { src.stop(tt); } catch (e) {} });
    } else {
      const osc = ctx.createOscillator();
      if (v.wave === 'saw') osc.type = 'sawtooth';
      else if (v.wave === 'tri') osc.setPeriodicWave(triWave(ctx));
      else osc.setPeriodicWave(pulseWave(ctx, v.wave === 'pulse12' ? 0.125 : v.wave === 'pulse25' ? 0.25 : 0.5));
      osc.frequency.value = midiToFreq(p.root + v.semitone);
      osc.detune.value = v.fine;
      osc.connect(g); osc.start(t0); stops.push((tt) => { try { osc.stop(tt); } catch (e) {} });
      voiceDetunes.push(osc.detune);
    }
  });

  // assignable mod LFOs
  p.lfos.forEach((lfo) => {
    if (lfo.target === 'off' || lfo.depth <= 0) return;
    const osc = ctx.createOscillator();
    if (lfo.shape === 'draw' && lfo.curve) {
      const pw = curveToPeriodicWave(ctx, lfo.curve);
      if (pw) osc.setPeriodicWave(pw); else osc.type = 'sine';
    } else {
      osc.type = lfo.shape;
    }
    osc.frequency.value = clamp(lfo.rate, 0.01, 20);
    const depth = ctx.createGain();
    if (lfo.target === 'cutoff') {
      depth.gain.value = lfo.depth * p.filter.cutoff * 0.9;
      osc.connect(depth); depth.connect(filter.frequency);
    } else if (lfo.target === 'volume') {
      depth.gain.value = clamp(lfo.depth, 0, 1) * 0.9;
      osc.connect(depth); depth.connect(ampMod.gain);
    } else if (lfo.target === 'pitch') {
      depth.gain.value = lfo.depth * 100; // cents
      osc.connect(depth); voiceDetunes.forEach((d) => depth.connect(d));
    }
    osc.start(t0); stops.push((tt) => { try { osc.stop(tt); } catch (e) {} });
  });

  // drawable envelopes — looping control-rate contours over a duration
  (p.envs || []).forEach((env) => {
    if (env.target === 'off' || env.depth <= 0 || !env.curve) return;
    const lenSec = env.sync ? clamp(p.loopLen, 0.5, 60) : clamp(env.length, 0.2, 60);
    const src = ctx.createBufferSource();
    src.buffer = curveToControlBuffer(ctx, env.curve, lenSec);
    src.loop = true;
    if (env.target === 'volume') {
      // splice a gain in series: floor (1-depth) .. 1, driven by the 0..1 contour
      const g = ctx.createGain(); g.gain.value = 1 - clamp(env.depth, 0, 1);
      const dep = ctx.createGain(); dep.gain.value = clamp(env.depth, 0, 1);
      src.connect(dep); dep.connect(g.gain);
      preAmpTail.connect(g); preAmpTail = g;
    } else if (env.target === 'cutoff') {
      const dep = ctx.createGain(); dep.gain.value = env.depth * p.filter.cutoff * 0.9;
      src.connect(dep); dep.connect(filter.frequency);
    } else if (env.target === 'pitch') {
      const dep = ctx.createGain(); dep.gain.value = env.depth * 100; // cents
      src.connect(dep); voiceDetunes.forEach((d) => dep.connect(d));
    }
    src.start(t0); stops.push((tt) => { try { src.stop(tt); } catch (e) {} });
  });
  preAmpTail.connect(ampMod);

  return {
    stop(when) {
      const tt = when ?? ctx.currentTime;
      try { volume.gain.cancelScheduledValues(tt); volume.gain.setTargetAtTime(0.0001, tt, 0.08); } catch (e) {}
      stops.forEach((fn) => fn(tt + 0.6));
      setTimeout(() => { try { volume.disconnect(); } catch (e) {} }, 900);
    },
  };
}

// ============================================================================
// OFFLINE RENDER + SEAMLESS LOOP CLEANUP
// Render [preRoll + loopLen + crossfade]; discard the pre-roll so the body is
// steady-state, then equal-power crossfade the natural continuation (samples
// just past the loop end) back over the loop head. The head therefore already
// contains what comes "after" the seam, so end->start wraps with no click.
// ============================================================================
async function renderLoop(p) {
  const sr = 44100;
  // Pre-roll lets the filter, LFOs and delay feedback reach steady state before
  // we sample the loop body — scaled to the delay tail so echoes are settled.
  const preRoll = clamp(Math.max(2.0, (p.delay.on ? p.delay.time * 6 : 0)), 2.0, 5.0);
  const L = clamp(p.loopLen, 0.5, 60);
  const cf = clamp(p.crossfade, 0.02, L * 0.5);
  const total = preRoll + L + cf;
  const ctx = new OfflineAudioContext(2, Math.ceil(total * sr) + 8, sr);
  buildGraph(ctx, p, ctx.destination, 0, total);
  const rendered = await ctx.startRendering();

  const start = Math.floor(preRoll * sr);
  const Ln = Math.floor(L * sr);
  const Cn = Math.floor(cf * sr);
  const loop = ctx.createBuffer(2, Ln, sr);
  for (let ch = 0; ch < 2; ch++) {
    const src = rendered.getChannelData(ch);
    const dst = loop.getChannelData(ch);
    for (let i = 0; i < Ln; i++) dst[i] = src[start + i];
    for (let j = 0; j < Cn; j++) {
      const x = j / Cn;
      const fin = Math.sin(0.5 * Math.PI * x);   // head fades in
      const fout = Math.cos(0.5 * Math.PI * x);  // continuation fades out
      dst[j] = dst[j] * fin + src[start + Ln + j] * fout;
    }
    // tiny edge guard against residual DC at the exact wrap sample
    dst[Ln - 1] = (dst[Ln - 1] + dst[0]) * 0.5;
  }
  return loop;
}

function bufferToWav(buffer) {
  const channels = buffer.numberOfChannels, sr = buffer.sampleRate, len = buffer.length;
  const blockAlign = channels * 2, dataBytes = len * blockAlign;
  const buf = new ArrayBuffer(44 + dataBytes), v = new DataView(buf);
  const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0, 'RIFF'); v.setUint32(4, 36 + dataBytes, true); w(8, 'WAVE');
  w(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
  v.setUint16(22, channels, true); v.setUint32(24, sr, true);
  v.setUint32(28, sr * blockAlign, true); v.setUint16(32, blockAlign, true); v.setUint16(34, 16, true);
  w(36, 'data'); v.setUint32(40, dataBytes, true);
  const data = [];
  for (let ch = 0; ch < channels; ch++) data.push(buffer.getChannelData(ch));
  let o = 44;
  for (let i = 0; i < len; i++) for (let ch = 0; ch < channels; ch++) { const s = clamp(data[ch][i], -1, 1); v.setInt16(o, s < 0 ? s * 0x8000 : s * 0x7FFF, true); o += 2; }
  return new Blob([buf], { type: 'audio/wav' });
}
function downloadBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 120);
}

const Slider = ({ label, value, min, max, step = 0.01, onChange, color = COLORS.lead, fmt }) => (
  <div className="flex flex-col gap-1">
    <div className="flex items-baseline justify-between">

    </div>
    <input type="range" className="rf" style={{ '--rf': color }} min={min} max={max} step={step} value={value}
      onChange={(e) => onChange(parseFloat(e.target.value))} />
  </div>
);
const Seg = ({ label, value, options, onChange, color = COLORS.lead }) => (
  <div className="flex flex-col gap-1 min-w-0">
    {label && <span className="text-[8px] uppercase tracking-wider text-stone-400" style={{ fontFamily: PS }}>{label}</span>}
    <div className="flex gap-0.5 bg-black/40 p-0.5 border border-stone-800 rounded-md">
      {options.map((opt) => {
        const v = opt.value ?? opt, lbl = opt.label ?? opt, active = v === value;
        return (
          <button key={v} onClick={() => onChange(v)} className="flex-1 px-1 py-1.5 text-[8px] uppercase rounded-[3px]"
            style={{ fontFamily: PS, background: active ? color : 'transparent', color: active ? '#0a0a0f' : '#999', boxShadow: active ? `0 0 8px ${color}80` : 'none', touchAction: 'manipulation' }}>{lbl}</button>
        );
      })}
    </div>
  </div>
);
// Touch-first canvas for drawing a contour (one LFO cycle, range [-1,1], or an
// envelope, range [0,1]). Drawing happens on a working ref + direct canvas paint
// for responsiveness; the patch state is committed on pointer-up (and the seed
// buttons), so audio re-renders once per gesture, not per move. touch-action:
// none — it's a dedicated draw surface.
const LFO_SEEDS = [
  ['SINE', (i, N) => Math.sin((i / N) * 2 * Math.PI)],
  ['TRI', (i, N) => { const p = i / N; return p < 0.5 ? p * 4 - 1 : 3 - p * 4; }],
  ['SAW', (i, N) => 1 - 2 * (i / N)],
  ['SQR', (i, N) => (i / N < 0.5 ? 1 : -1)],
  ['RND', () => Math.random() * 2 - 1],
];
const ENV_SEEDS = [
  ['RISE', (i, N) => i / (N - 1)],
  ['FALL', (i, N) => 1 - i / (N - 1)],
  ['HILL', (i, N) => 0.5 - 0.5 * Math.cos((i / N) * 2 * Math.PI)],
  ['PLUCK', (i, N) => Math.pow(1 - i / N, 3)],
  ['RND', () => Math.random()],
];
const DrawPad = ({ curve, color, onChange, height = 88, min = -1, max = 1, label = 'Draw one cycle', seeds = LFO_SEEDS }) => {
  const cvs = useRef(null);
  const work = useRef(curve.slice());
  const drawing = useRef(false);
  const lastIdx = useRef(-1);
  const rng = max - min;
  const yOf = (v) => (1 - (v - min) / rng); // value -> 0..1 from top
  const render = (arr) => {
    const c = cvs.current; if (!c) return;
    const x2 = c.getContext('2d'); const W = c.width, H = c.height;
    x2.clearRect(0, 0, W, H);
    x2.fillStyle = '#0a0a0f'; x2.fillRect(0, 0, W, H);
    x2.strokeStyle = '#21212b'; x2.lineWidth = 1;
    for (let g = 1; g < 4; g++) { const y = (g / 4) * H; x2.beginPath(); x2.moveTo(0, y); x2.lineTo(W, y); x2.stroke(); }
    const zero = clamp(yOf(min < 0 ? 0 : min), 0, 1) * H; // baseline (center for bipolar, bottom for unipolar)
    x2.strokeStyle = '#33333f'; x2.beginPath(); x2.moveTo(0, zero); x2.lineTo(W, zero); x2.stroke();
    const N = arr.length;
    x2.beginPath();
    for (let i = 0; i < N; i++) { const x = (i / (N - 1)) * W; const y = yOf(arr[i]) * H; i === 0 ? x2.moveTo(x, y) : x2.lineTo(x, y); }
    x2.strokeStyle = color; x2.lineWidth = 2; x2.shadowColor = color; x2.shadowBlur = 6; x2.stroke(); x2.shadowBlur = 0;
  };
  useEffect(() => { work.current = curve.slice(); render(work.current); }, [curve]);
  const pos = (e) => {
    const r = cvs.current.getBoundingClientRect();
    const x = clamp((e.clientX - r.left) / r.width, 0, 1);
    const y = clamp((e.clientY - r.top) / r.height, 0, 1);
    return { idx: clamp(Math.round(x * (work.current.length - 1)), 0, work.current.length - 1), val: clamp(min + (1 - y) * rng, min, max) };
  };
  const apply = (e) => {
    const { idx, val } = pos(e); const arr = work.current;
    if (lastIdx.current >= 0 && Math.abs(idx - lastIdx.current) > 1) {
      const a = lastIdx.current, va = arr[a], lo = Math.min(a, idx), hi = Math.max(a, idx);
      for (let i = lo; i <= hi; i++) { const t = (i - a) / (idx - a); arr[i] = clamp(va + (val - va) * t, min, max); }
    } else arr[idx] = val;
    lastIdx.current = idx; render(arr);
  };
  const down = (e) => { drawing.current = true; lastIdx.current = -1; try { cvs.current.setPointerCapture(e.pointerId); } catch (er) {} apply(e); };
  const move = (e) => { if (drawing.current) apply(e); };
  const up = () => { if (!drawing.current) return; drawing.current = false; lastIdx.current = -1; onChange(work.current.slice()); };
  return (
    <div className="flex flex-col gap-1 mt-2.5">
      <span className="text-[8px] uppercase tracking-wider text-stone-400" style={{ fontFamily: PS }}>{label}</span>
      <canvas ref={cvs} width={512} height={height} onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerCancel={up}
        style={{ width: '100%', height, borderRadius: 6, border: `1px solid ${color}44`, touchAction: 'none', display: 'block' }} />
      <div className="flex gap-1 mt-1">
        {seeds.map(([lbl, fn]) => (
          <button key={lbl} onClick={() => { const N = work.current.length, arr = new Array(N); for (let i = 0; i < N; i++) arr[i] = clamp(fn(i, N), min, max); onChange(arr); }}
            className="flex-1 py-1 rounded-[3px] text-[7px] active:translate-y-px" style={{ fontFamily: PS, background: '#15151c', border: `1px solid ${color}44`, color, touchAction: 'manipulation' }}>{lbl}</button>
        ))}
      </div>
    </div>
  );
};
const Panel = ({ title, color, children, right }) => (
  <div className="rounded-lg p-3" style={{ background: `linear-gradient(180deg, ${color}10, transparent)`, border: `1px solid ${color}30` }}>

      <span className="text-[10px] tracking-[0.2em]" style={{ fontFamily: PS, color }}>{title}</span>

    </div>
    {children}
  </div>
);

function RawFormless() {
  const [patch, setPatch] = useState(defaultPatch);
  const [playing, setPlaying] = useState(false);
  const [rendering, setRendering] = useState(false);
  const [toast, setToast] = useState(null);
  const ctxRef = useRef(null);
  const liveRef = useRef(null);
  const patchRef = useRef(patch);
  patchRef.current = patch;

  const flash = (msg, color = COLORS.lead) => { setToast({ msg, color }); setTimeout(() => setToast(null), 1800); };

  // patch update helpers
  const set = (path, val) => setPatch((p) => {
    const n = JSON.parse(JSON.stringify(p)); let o = n;
    for (let i = 0; i < path.length - 1; i++) o = o[path[i]];
    o[path[path.length - 1]] = val; return n;
  });
  const setVoice = (i, key, val) => set(['voices', i, key], val);
  const setLfo = (i, key, val) => set(['lfos', i, key], val);
  const setEnv = (i, key, val) => set(['envs', i, key], val);

  const ensureCtx = () => {
    if (!ctxRef.current) ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    return ctxRef.current;
  };
  const stopLive = () => { if (liveRef.current) { liveRef.current.stop(); liveRef.current = null; } setPlaying(false); };
  const startLive = () => {
    const ctx = ensureCtx(); ctx.resume();
    if (liveRef.current) liveRef.current.stop();
    liveRef.current = buildGraph(ctx, patchRef.current, ctx.destination, ctx.currentTime + 0.02, Infinity);
    setPlaying(true);
  };
  const togglePlay = () => { if (playing) stopLive(); else startLive(); };

  // restart the live graph when the patch changes mid-preview, so tweaks are
  // audible immediately (debounced to avoid thrashing on slider drags).
  useEffect(() => {
    if (!playing) return;
    const id = setTimeout(() => { if (playing) startLive(); }, 180);
    return () => clearTimeout(id);
  }, [patch]); // eslint-disable-line

  useEffect(() => () => { if (liveRef.current) liveRef.current.stop(); }, []);

  const doRender = async () => {
    setRendering(true); stopLive();
    try {
      const buf = await renderLoop(patchRef.current);
      setRendering(false);
      return buf;
    } catch (e) { setRendering(false); flash('RENDER FAILED', COLORS.bass); throw e; }
  };
  const exportDownload = async () => {
    const buf = await doRender(); const blob = bufferToWav(buf);
    downloadBlob(blob, `${(patch.name || 'drone').replace(/\s+/g, '_')}.wav`);
    flash('WAV DOWNLOADED', COLORS.lead);
  };
  const exportToRawForm = async () => {
    const buf = await doRender(); const blob = bufferToWav(buf);
    try { await window.YuccaSamples.put({ name: patch.name || 'DRONE', blob, mime: 'audio/wav' }); flash('SENT TO RAW FORM', COLORS.samples); }
    catch (e) { flash('SEND FAILED', COLORS.bass); }
  };

  const fromRawForm = typeof window !== 'undefined' && /from=rawform/.test(window.location.search);

  return (
    <div className="max-w-[900px] mx-auto crt relative" style={{ minHeight: '100vh' }}>
      {/* HEADER */}
      <div className="sticky top-0 z-40 px-3 pt-3 pb-2" style={{ background: 'linear-gradient(180deg, #120608, #0a0405)', borderBottom: `1px solid ${COLORS.bass}33` }}>
        <div className="flex items-center gap-2">
          <a href="../index.html" className="flex items-center gap-1 px-2.5 py-2 rounded-md active:translate-y-px shrink-0" style={{ background: '#1a1010', border: `1px solid ${COLORS.bass}55`, color: COLORS.bass, fontFamily: PS, fontSize: '8px', textDecoration: 'none', touchAction: 'manipulation' }}>{'<'} RAW FORM</a>
          <div className="flex-1 min-w-0">
            <div className="text-[12px] tracking-[0.25em] truncate" style={{ fontFamily: PS, color: COLORS.cream }}>RAW FORMLESS</div>
            <div className="text-[7px] tracking-[0.2em] mt-0.5" style={{ fontFamily: PS, color: COLORS.lead }}>8-BIT AMBIENCE & DRONE</div>
          </div>
          <button onClick={togglePlay} className="px-4 py-2.5 border-2 rounded-md flex items-center gap-2 active:translate-y-px shrink-0" style={{ background: playing ? COLORS.lead : '#1a1a22', borderColor: playing ? '#5acc5a' : '#3a3a45', color: playing ? '#0a0a0f' : COLORS.cream, boxShadow: playing ? `0 0 16px ${COLORS.lead}80` : 'none', fontFamily: PS, fontSize: '10px', touchAction: 'manipulation' }}>{playing ? 'STOP' : 'PREVIEW'}</button>
        </div>
        {fromRawForm && <div className="text-[7px] tracking-wider mt-1.5" style={{ fontFamily: PS, color: COLORS.samples }}>◇ RENDER A LOOP, THEN SEND IT TO RAW FORM — IT APPEARS IN THE SAMPLER'S "FROM YUCCA-FX" BROWSER.</div>}
      </div>

      <div className="p-3 space-y-3" style={{ paddingBottom: 40 }}>
        {/* VOICES */}
        <Panel title="VOICES" color={COLORS.bass} right={<span className="text-[8px] tracking-wider text-stone-500" style={{ fontFamily: PS }}>ROOT {noteName(patch.root)}</span>}>
          <div className="mb-3"><Slider label="Root note" value={patch.root} min={24} max={64} step={1} color={COLORS.bass} fmt={(v) => noteName(v)} onChange={(v) => set(['root'], v)} /></div>
          <div className="space-y-2.5">
            {patch.voices.map((v, i) => (
              <div key={i} className="rounded-md p-2.5" style={{ background: '#0c0c12', border: `1px solid ${v.on ? COLORS.bass + '44' : '#1f1f29'}`, opacity: v.on ? 1 : 0.55 }}>
                <div className="flex items-center gap-2 mb-2">
                  <button onClick={() => setVoice(i, 'on', !v.on)} className="px-2 py-1.5 rounded-[3px] text-[8px]" style={{ fontFamily: PS, background: v.on ? COLORS.bass : 'transparent', color: v.on ? '#0a0a0f' : '#888', border: `1px solid ${COLORS.bass}55`, touchAction: 'manipulation' }}>{v.on ? 'ON' : 'OFF'}</button>
                  <span className="text-[9px] tracking-wider" style={{ fontFamily: PS, color: COLORS.cream }}>OSC {i + 1}</span>
                  <div className="flex-1"><Seg value={v.wave} options={WAVES.map((w) => ({ value: w, label: WAVE_LABEL[w] }))} onChange={(w) => setVoice(i, 'wave', w)} color={COLORS.bass} /></div>

                  <Slider label="Fine" value={v.fine} min={-50} max={50} step={1} color={COLORS.bass} fmt={(x) => (x > 0 ? '+' : '') + x + 'c'} onChange={(x) => setVoice(i, 'fine', x)} />
                  <Slider label="Level" value={v.level} min={0} max={1} color={COLORS.bass} fmt={(x) => Math.round(x * 100)} onChange={(x) => setVoice(i, 'level', x)} />
                  <Slider label="Pan" value={v.pan} min={-1} max={1} color={COLORS.bass} fmt={(x) => x === 0 ? 'C' : (x < 0 ? 'L' : 'R') + Math.round(Math.abs(x) * 100)} onChange={(x) => setVoice(i, 'pan', x)} />
                </div>

            ))}

        {/* FILTER */}

          </div>
        </Panel>

        {/* MOD LFOs */}
        <Panel title="MODULATION" color={COLORS.echo} right={<span className="text-[7px] tracking-wider text-stone-500" style={{ fontFamily: PS }}>ASSIGNABLE LFOs</span>}>
          <div className="space-y-2.5">
            {patch.lfos.map((lfo, i) => (
              <div key={i} className="rounded-md p-2.5" style={{ background: '#0c0c12', border: `1px solid ${lfo.target !== 'off' ? COLORS.echo + '44' : '#1f1f29'}`, opacity: lfo.target !== 'off' ? 1 : 0.6 }}>
                <div className="flex items-center gap-2 mb-2">
                  <span className="text-[9px] tracking-wider shrink-0" style={{ fontFamily: PS, color: COLORS.cream }}>LFO {i + 1}</span>
                  <div className="flex-1"><Seg label="" value={lfo.target} options={LFO_TARGETS.map((t) => ({ value: t, label: t === 'off' ? 'OFF' : t.slice(0, 4).toUpperCase() }))} onChange={(t) => setLfo(i, 'target', t)} color={COLORS.echo} /></div>

                <div className="grid grid-cols-3 gap-2.5">
                  <Seg label="Shape" value={lfo.shape} options={[...LFO_SHAPES, 'draw'].map((s) => ({ value: s, label: s === 'draw' ? 'DRW' : s.slice(0, 3).toUpperCase() }))} onChange={(s) => { if (s === 'draw' && !lfo.curve) setLfo(i, 'curve', defaultCurve()); setLfo(i, 'shape', s); }} color={COLORS.echo} />
                  <Slider label="Rate" value={lfo.rate} min={0.01} max={8} step={0.01} color={COLORS.echo} fmt={(v) => v.toFixed(2) + 'hz'} onChange={(v) => setLfo(i, 'rate', v)} />
                  <Slider label="Depth" value={lfo.depth} min={0} max={1} color={COLORS.echo} fmt={(v) => Math.round(v * 100)} onChange={(v) => setLfo(i, 'depth', v)} />
                </div>
                {lfo.shape === 'draw' && <DrawPad curve={lfo.curve || defaultCurve()} color={COLORS.echo} onChange={(c) => setLfo(i, 'curve', c)} />}
              </div>
            ))}
          </div>
        </Panel>

        {/* ENVELOPES */}
        <Panel title="ENVELOPES" color={COLORS.drums} right={<span className="text-[7px] tracking-wider text-stone-500" style={{ fontFamily: PS }}>DRAWN CONTOURS</span>}>
          <div className="space-y-2.5">
            {patch.envs.map((env, i) => (
              <div key={i} className="rounded-md p-2.5" style={{ background: '#0c0c12', border: `1px solid ${env.target !== 'off' ? COLORS.drums + '44' : '#1f1f29'}`, opacity: env.target !== 'off' ? 1 : 0.6 }}>
                <div className="flex items-center gap-2 mb-2">
                  <span className="text-[9px] tracking-wider shrink-0" style={{ fontFamily: PS, color: COLORS.cream }}>ENV {i + 1}</span>
                  <div className="flex-1"><Seg label="" value={env.target} options={LFO_TARGETS.map((t) => ({ value: t, label: t === 'off' ? 'OFF' : t.slice(0, 4).toUpperCase() }))} onChange={(t) => setEnv(i, 'target', t)} color={COLORS.drums} /></div>
                </div>
                <div className="grid grid-cols-3 gap-2.5 items-end">
                  <Slider label="Depth" value={env.depth} min={0} max={1} color={COLORS.drums} fmt={(v) => Math.round(v * 100)} onChange={(v) => setEnv(i, 'depth', v)} />
                  <Slider label={env.sync ? 'Length (sync)' : 'Length'} value={env.sync ? patch.loopLen : env.length} min={0.5} max={32} step={0.5} color={env.sync ? '#555' : COLORS.drums} fmt={(v) => v.toFixed(1) + 's'} onChange={(v) => { if (!env.sync) setEnv(i, 'length', v); }} />
                  <button onClick={() => setEnv(i, 'sync', !env.sync)} className="h-7 rounded-md text-[8px] active:translate-y-px" style={{ fontFamily: PS, background: env.sync ? COLORS.drums : 'transparent', color: env.sync ? '#0a0a0f' : '#999', border: `1px solid ${COLORS.drums}55`, touchAction: 'manipulation' }}>{env.sync ? 'SYNC ON' : 'SYNC OFF'}</button>
                </div>
                <DrawPad curve={env.curve || defaultEnvCurve()} color={COLORS.drums} min={0} max={1} label="Draw contour" seeds={ENV_SEEDS} onChange={(c) => setEnv(i, 'curve', c)} />
              </div>
            ))}
          </div>
        </Panel>

        {/* FX */}
        <Panel title="AMBIENT FX" color={COLORS.samples}>
          {(() => {
            const card = (key, name, body) => (
              <div className="rounded-md p-2.5" style={{ background: '#0c0c12', border: `1px solid ${patch[key].on ? COLORS.samples + '44' : '#1f1f29'}`, opacity: patch[key].on ? 1 : 0.6 }}>
                <div className="flex items-center gap-2 mb-2">
                  <button onClick={() => set([key, 'on'], !patch[key].on)} className="px-2 py-1.5 rounded-[3px] text-[8px]" style={{ fontFamily: PS, background: patch[key].on ? COLORS.samples : 'transparent', color: patch[key].on ? '#0a0a0f' : '#888', border: `1px solid ${COLORS.samples}55`, touchAction: 'manipulation' }}>{patch[key].on ? 'ON' : 'OFF'}</button>
                  <span className="text-[9px] tracking-wider" style={{ fontFamily: PS, color: COLORS.cream }}>{name}</span>
                </div>
                {body}
              </div>
            );
            const pct = (v) => Math.round(v * 100);
            return (
          <div className="space-y-3">
            {card('bitcrush', 'BIT CRUNCH', (
              <div className="grid grid-cols-2 gap-2.5">
                <Slider label="Bits" value={patch.bitcrush.bits} min={1} max={16} step={0.1} color={COLORS.samples} fmt={(v) => v.toFixed(1)} onChange={(v) => set(['bitcrush', 'bits'], v)} />
                <Slider label="Mix" value={patch.bitcrush.mix} min={0} max={1} color={COLORS.samples} fmt={pct} onChange={(v) => set(['bitcrush', 'mix'], v)} />
              </div>
            ))}
            {card('chorus', 'CHORUS', (
              <div className="grid grid-cols-3 gap-2.5">
                <Slider label="Rate" value={patch.chorus.rate} min={0.02} max={6} step={0.01} color={COLORS.samples} fmt={(v) => v.toFixed(2) + 'hz'} onChange={(v) => set(['chorus', 'rate'], v)} />
                <Slider label="Depth" value={patch.chorus.depth} min={0} max={1} color={COLORS.samples} fmt={pct} onChange={(v) => set(['chorus', 'depth'], v)} />
                <Slider label="Mix" value={patch.chorus.mix} min={0} max={1} color={COLORS.samples} fmt={pct} onChange={(v) => set(['chorus', 'mix'], v)} />
              </div>
            ))}
            {card('flanger', 'FLANGER', (
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-2.5">
                <Slider label="Rate" value={patch.flanger.rate} min={0.02} max={6} step={0.01} color={COLORS.samples} fmt={(v) => v.toFixed(2) + 'hz'} onChange={(v) => set(['flanger', 'rate'], v)} />
                <Slider label="Depth" value={patch.flanger.depth} min={0} max={1} color={COLORS.samples} fmt={pct} onChange={(v) => set(['flanger', 'depth'], v)} />
                <Slider label="Feedback" value={patch.flanger.feedback} min={0} max={0.95} color={COLORS.samples} fmt={pct} onChange={(v) => set(['flanger', 'feedback'], v)} />
                <Slider label="Mix" value={patch.flanger.mix} min={0} max={1} color={COLORS.samples} fmt={pct} onChange={(v) => set(['flanger', 'mix'], v)} />
              </div>
            ))}
            {card('phaser', 'PHASER', (
              <div className="grid grid-cols-3 gap-2.5">
                <Slider label="Rate" value={patch.phaser.rate} min={0.02} max={6} step={0.01} color={COLORS.samples} fmt={(v) => v.toFixed(2) + 'hz'} onChange={(v) => set(['phaser', 'rate'], v)} />
                <Slider label="Depth" value={patch.phaser.depth} min={0} max={1} color={COLORS.samples} fmt={pct} onChange={(v) => set(['phaser', 'depth'], v)} />
                <Slider label="Mix" value={patch.phaser.mix} min={0} max={1} color={COLORS.samples} fmt={pct} onChange={(v) => set(['phaser', 'mix'], v)} />
              </div>
            ))}
            <div className="rounded-md p-2.5" style={{ background: '#0c0c12', border: `1px solid ${patch.delay.on ? COLORS.samples + '44' : '#1f1f29'}`, opacity: patch.delay.on ? 1 : 0.6 }}>
              <div className="flex items-center gap-2 mb-2">
                <button onClick={() => set(['delay', 'on'], !patch.delay.on)} className="px-2 py-1.5 rounded-[3px] text-[8px]" style={{ fontFamily: PS, background: patch.delay.on ? COLORS.samples : 'transparent', color: patch.delay.on ? '#0a0a0f' : '#888', border: `1px solid ${COLORS.samples}55`, touchAction: 'manipulation' }}>{patch.delay.on ? 'ON' : 'OFF'}</button>
                <span className="text-[9px] tracking-wider" style={{ fontFamily: PS, color: COLORS.cream }}>DELAY</span>
              </div>
              <div className="grid grid-cols-3 gap-2.5">
                <Slider label="Time" value={patch.delay.time} min={0.02} max={1.2} color={COLORS.samples} fmt={(v) => Math.round(v * 1000) + 'ms'} onChange={(v) => set(['delay', 'time'], v)} />
                <Slider label="Feedback" value={patch.delay.feedback} min={0} max={0.92} color={COLORS.samples} fmt={(v) => Math.round(v * 100)} onChange={(v) => set(['delay', 'feedback'], v)} />
                <Slider label="Mix" value={patch.delay.mix} min={0} max={1} color={COLORS.samples} fmt={(v) => Math.round(v * 100)} onChange={(v) => set(['delay', 'mix'], v)} />
              </div>
            </div>
            <div className="rounded-md p-2.5" style={{ background: '#0c0c12', border: `1px solid ${patch.reverb.on ? COLORS.samples + '44' : '#1f1f29'}`, opacity: patch.reverb.on ? 1 : 0.6 }}>
              <div className="flex items-center gap-2 mb-2">
                <button onClick={() => set(['reverb', 'on'], !patch.reverb.on)} className="px-2 py-1.5 rounded-[3px] text-[8px]" style={{ fontFamily: PS, background: patch.reverb.on ? COLORS.samples : 'transparent', color: patch.reverb.on ? '#0a0a0f' : '#888', border: `1px solid ${COLORS.samples}55`, touchAction: 'manipulation' }}>{patch.reverb.on ? 'ON' : 'OFF'}</button>
                <span className="text-[9px] tracking-wider" style={{ fontFamily: PS, color: COLORS.cream }}>REVERB</span>
              </div>
              <div className="grid grid-cols-2 gap-2.5">
                <Slider label="Size" value={patch.reverb.size} min={0} max={1} color={COLORS.samples} fmt={(v) => Math.round(v * 100)} onChange={(v) => set(['reverb', 'size'], v)} />
                <Slider label="Mix" value={patch.reverb.mix} min={0} max={1} color={COLORS.samples} fmt={(v) => Math.round(v * 100)} onChange={(v) => set(['reverb', 'mix'], v)} />
              </div>
            </div>
          </div>
            );
          })()}
        </Panel>

        {/* MASTER */}
        <Panel title="MASTER" color={COLORS.cream}>
          <div className="grid grid-cols-2 gap-3">
            <Slider label="Volume" value={patch.master.volume} min={0} max={1} color={COLORS.cream} fmt={(v) => Math.round(v * 100)} onChange={(v) => set(['master', 'volume'], v)} />
            <Slider label="Drive" value={patch.master.drive} min={0} max={1} color={COLORS.cream} fmt={(v) => Math.round(v * 100)} onChange={(v) => set(['master', 'drive'], v)} />
          </div>
        </Panel>

        {/* LOOP + EXPORT */}
        <Panel title="LOOP / EXPORT" color={COLORS.song}>
          <div className="grid grid-cols-2 gap-3 mb-3">
            <Slider label="Loop length" value={patch.loopLen} min={1} max={32} step={0.5} color={COLORS.song} fmt={(v) => v.toFixed(1) + 's'} onChange={(v) => set(['loopLen'], v)} />
            <Slider label="Seam crossfade" value={patch.crossfade} min={0.05} max={4} step={0.05} color={COLORS.song} fmt={(v) => Math.round(v * 1000) + 'ms'} onChange={(v) => set(['crossfade'], Math.min(v, patch.loopLen * 0.5))} />
          </div>
          <input value={patch.name} onChange={(e) => set(['name'], e.target.value.slice(0, 40))} placeholder="LOOP NAME"
            className="w-full mb-3 px-3 py-2 rounded-md outline-none" style={{ fontFamily: VT, fontSize: 18, background: '#0a0a0f', border: `1px solid ${COLORS.song}44`, color: COLORS.cream }} />
          <div className="grid grid-cols-2 gap-2">
            <button disabled={rendering} onClick={exportDownload} className="py-2.5 rounded-md active:translate-y-px" style={{ background: '#15151c', border: `1.5px solid ${COLORS.song}88`, color: COLORS.song, fontFamily: PS, fontSize: '9px', opacity: rendering ? 0.5 : 1, touchAction: 'manipulation' }}>{rendering ? 'RENDERING…' : 'DOWNLOAD WAV'}</button>
            <button disabled={rendering} onClick={exportToRawForm} className="py-2.5 rounded-md active:translate-y-px" style={{ background: `${COLORS.samples}22`, border: `1.5px solid ${COLORS.samples}`, color: COLORS.samples, fontFamily: PS, fontSize: '9px', boxShadow: `0 0 10px ${COLORS.samples}44`, opacity: rendering ? 0.5 : 1, touchAction: 'manipulation' }}>{rendering ? 'RENDERING…' : 'SEND TO RAW FORM'}</button>
          </div>
          <div className="text-[7px] tracking-wider text-stone-500 mt-2.5 leading-relaxed" style={{ fontFamily: PS }}>POP-FREE LOOP via equal-power seam crossfade. SEND lands in the shared sample library — open RAW FORM's sampler, tap a slot's FX button, "FROM YUCCA-FX".</div>
        </Panel>

        <div className="text-center text-[7px] tracking-widest text-stone-600 pt-1" style={{ fontFamily: PS }}>© yuccabuccA · RAW FORMLESS v0.1</div>
      </div>

      {toast && (
        <div className="fixed left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-md" style={{ bottom: 28, background: '#0a0a0f', border: `1.5px solid ${toast.color}`, color: toast.color, fontFamily: PS, fontSize: '9px', boxShadow: `0 0 18px ${toast.color}55`, animation: 'rfPulse 1.6s ease-in-out infinite' }}>{toast.msg}</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(RawFormless));
})();
</script>
</body>
</html>
